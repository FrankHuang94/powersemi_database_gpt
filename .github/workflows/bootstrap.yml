name: Bootstrap database

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import generated database
        run: |
          curl -fsSL https://files.catbox.moe/1s7olx.tgz -o /tmp/powersemi-db.tgz
          tar -xzf /tmp/powersemi-db.tgz
          rm -f .github/workflows/bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build datacenter power semiconductor knowledge database"
          git push
